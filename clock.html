<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Timezone Digital Clock</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 50px;
        }

        .header h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .clocks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .clock-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            transition: 0.4s ease;
            text-align: center;
        }

        .clock-card:hover {
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-10px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.2);
        }

        .timezone-name {
            color: #fff;
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .city-name {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .digital-clock {
            font-size: 3rem;
            font-weight: 800;
            color: #fff;
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
            margin-bottom: 15px;
            text-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        .analog-clock {
            width: 150px;
            height: 150px;
            margin: 20px auto;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.3);
            position: relative;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.1);
        }

        .clock-center {
            width: 12px;
            height: 12px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            box-shadow: 0 0 5px rgba(0,0,0,0.3);
        }

        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom center;
            border-radius: 10px;
        }

        .hour-hand {
            width: 6px;
            height: 40px;
            background: rgba(255, 255, 255, 0.9);
            margin-left: -3px;
        }

        .minute-hand {
            width: 4px;
            height: 55px;
            background: rgba(255, 255, 255, 0.7);
            margin-left: -2px;
        }

        .second-hand {
            width: 2px;
            height: 60px;
            background: #ff6b6b;
            margin-left: -1px;
        }

        .date-info {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
            margin-top: 15px;
            font-weight: 500;
        }

        .toggle-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .toggle-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s ease;
            margin: 0 10px;
            font-weight: 600;
        }

        .toggle-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .toggle-btn.active {
            background: rgba(255, 255, 255, 0.4);
            border-color: white;
        }

        .back-link {
            text-align: center;
            margin-top: 40px;
        }

        .back-link a {
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .back-link a:hover {
            opacity: 0.8;
            transform: translateX(-5px);
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }

            .clocks-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .digital-clock {
                font-size: 2rem;
            }

            .toggle-btn {
                display: block;
                margin: 10px auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⏰ Global Time Zone Clock</h1>
            <p>Real-time display across multiple time zones worldwide</p>
        </div>

        <div class="toggle-section">
            <button class="toggle-btn active" onclick="toggleView('both')">Both Views</button>
            <button class="toggle-btn" onclick="toggleView('digital')">Digital Only</button>
            <button class="toggle-btn" onclick="toggleView('analog')">Analog Only</button>
        </div>

        <div class="clocks-grid" id="clocksGrid"></div>

        <div class="back-link">
            <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Website</a>
        </div>
    </div>

    <script>
        const timeZones = [
            { name: 'Pakistan', city: 'Lahore', timezone: 'Asia/Karachi' },
            { name: 'USA', city: 'New York', timezone: 'America/New_York' },
            { name: 'UK', city: 'London', timezone: 'Europe/London' },
            { name: 'UAE', city: 'Dubai', timezone: 'Asia/Dubai' },
            { name: 'India', city: 'Mumbai', timezone: 'Asia/Kolkata' },
            { name: 'Canada', city: 'Toronto', timezone: 'America/Toronto' },
            { name: 'Australia', city: 'Sydney', timezone: 'Australia/Sydney' },
            { name: 'Japan', city: 'Tokyo', timezone: 'Asia/Tokyo' },
            { name: 'Germany', city: 'Berlin', timezone: 'Europe/Berlin' },
            { name: 'Singapore', city: 'Singapore', timezone: 'Asia/Singapore' },
            { name: 'Brazil', city: 'São Paulo', timezone: 'America/Sao_Paulo' },
            { name: 'South Africa', city: 'Johannesburg', timezone: 'Africa/Johannesburg' }
        ];

        let viewMode = 'both';

        function createClockCard(tz) {
            return `
                <div class="clock-card">
                    <div class="timezone-name">${tz.name}</div>
                    <div class="city-name">${tz.city}</div>
                    
                    <div id="analog-${tz.timezone}" class="analog-clock" style="display: ${viewMode === 'digital' ? 'none' : 'block'}">
                        <div class="hand hour-hand" style="transform: rotate(0deg)"></div>
                        <div class="hand minute-hand" style="transform: rotate(0deg)"></div>
                        <div class="hand second-hand" style="transform: rotate(0deg)"></div>
                        <div class="clock-center"></div>
                    </div>
                    
                    <div id="digital-${tz.timezone}" class="digital-clock" style="display: ${viewMode === 'analog' ? 'none' : 'block'}">00:00:00</div>
                    <div class="date-info" id="date-${tz.timezone}"></div>
                </div>
            `;
        }

        function updateClock(tz) {
            const formatter = new Intl.DateTimeFormat('en-US', {
                timeZone: tz.timezone,
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false,
                year: 'numeric',
                month: 'short',
                day: '2-digit'
            });

            const now = new Date();
            const parts = formatter.formatToParts(now);
            const timeObj = {};
            parts.forEach(part => {
                timeObj[part.type] = part.value;
            });

            // Update digital clock
            const digitalElement = document.getElementById(`digital-${tz.timezone}`);
            if (digitalElement) {
                digitalElement.textContent = `${timeObj.hour}:${timeObj.minute}:${timeObj.second}`;
            }

            // Update date info
            const dateElement = document.getElementById(`date-${tz.timezone}`);
            if (dateElement) {
                dateElement.textContent = `${timeObj.day} ${timeObj.month} ${timeObj.year}`;
            }

            // Update analog clock
            const analogElement = document.getElementById(`analog-${tz.timezone}`);
            if (analogElement) {
                const hour = parseInt(timeObj.hour);
                const minute = parseInt(timeObj.minute);
                const second = parseInt(timeObj.second);

                const hourDeg = (hour % 12) * 30 + minute * 0.5;
                const minuteDeg = minute * 6 + second * 0.1;
                const secondDeg = second * 6;

                const hourHand = analogElement.querySelector('.hour-hand');
                const minuteHand = analogElement.querySelector('.minute-hand');
                const secondHand = analogElement.querySelector('.second-hand');

                if (hourHand) hourHand.style.transform = `rotate(${hourDeg}deg)`;
                if (minuteHand) minuteHand.style.transform = `rotate(${minuteDeg}deg)`;
                if (secondHand) secondHand.style.transform = `rotate(${secondDeg}deg)`;
            }
        }

        function initializeClocks() {
            const grid = document.getElementById('clocksGrid');
            grid.innerHTML = timeZones.map(tz => createClockCard(tz)).join('');
            updateAllClocks();
        }

        function updateAllClocks() {
            timeZones.forEach(tz => updateClock(tz));
        }

        function toggleView(mode) {
            viewMode = mode;
            
            // Update button states
            document.querySelectorAll('.toggle-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            // Update display
            timeZones.forEach(tz => {
                const analogElement = document.getElementById(`analog-${tz.timezone}`);
                const digitalElement = document.getElementById(`digital-${tz.timezone}`);

                if (analogElement && digitalElement) {
                    if (mode === 'both') {
                        analogElement.style.display = 'block';
                        digitalElement.style.display = 'block';
                    } else if (mode === 'digital') {
                        analogElement.style.display = 'none';
                        digitalElement.style.display = 'block';
                    } else if (mode === 'analog') {
                        analogElement.style.display = 'block';
                        digitalElement.style.display = 'none';
                    }
                }
            });
        }

        // Initialize on page load
        window.addEventListener('load', initializeClocks);

        // Update clocks every second
        setInterval(updateAllClocks, 1000);
    </script>
</body>
</html>
